name: Docker Build and Push Pipeline (Token Auth)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: s12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔧 Grant access to Docker socket (for self-hosted runner)
      - name: Allow Docker socket access
        run: |
          sudo chmod 666 /var/run/docker.sock
          # Alternatively, add the runner user to docker group (requires re-login)
          # sudo usermod -aG docker $USER

      # Docker installation step (kept for self-hosted runners that may not have Docker)
      - name: Install Docker (if needed)
        run: |
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com | sudo sh
            sudo usermod -aG docker $USER
          else
            docker --version
          fi

      - name: Build Docker image
        run: docker build -t s5carles/ci-cd:s12 .

      - name: Verify built image
        run: docker images | grep s5carles/ci-cd:s12

      - name: Run container with port mapping (host 8080 -> container 80)
        run: |
          docker run -d -p 8080:80 --name s12-ci-cd s5carles/ci-cd:s12

      - name: List running containers
        run: docker ps

      # 🔐 Login to Docker Hub using token as password
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.ACCESS_TOKEN }}   # Token from Docker Hub

      # ✅ Corrected push command (username is already part of the image name)
      - name: Push image to Docker Hub
        run: docker push s5carles/ci-cd:s12

      - name: Cleanup (optional)
        if: always()
        run: |
          docker stop s12-ci-cd || true
          docker rm s12-ci-cd || true