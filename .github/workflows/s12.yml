name: Docker Build and Push Pipeline (Token Auth)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Force Node.js 34 to avoid deprecation warnings (optional)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE34: true

jobs:
  build-and-push:
    runs-on: s12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Update to @v5 if available, but FORCE_NODE34 works

      
      

      # Install Docker if missing (self-hosted)
      - name: Install Docker (if needed)
        run: |
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com | sudo sh
            sudo usermod -aG docker $USER
          else
            docker --version
          fi

      # Grant access to Docker socket (for self-hosted runner)
      - name: Allow Docker socket access
        run: |
          sudo chmod 666 /var/run/docker.sock

      - name: Build Docker image
        run: docker build -t s5carles/ci-cd:s13 .

      - name: Verify built image
        run: docker images | grep s5carles/ci-cd:s13

      - name: Run container with port mapping (host 8081 -> container 80)
        run: |
          docker run -d -p 8081:80 --name s13-ci-cd s5carles/ci-cd:s13

      - name: List running containers
        run: docker ps

      # Login to Docker Hub using token (as password)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.ACCESS_TOKEN }}

      # Fixed push command - use correct image name (username already in tag)
      - name: Push image to Docker Hub
        run: docker push s5carles/ci-cd:s13

      